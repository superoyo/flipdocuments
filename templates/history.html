<!DOCTYPE html>
<html class="light" lang="th">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>History | FlipGrid</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script>
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "surface-container": "#ecedf7",
          "surface-container-low": "#f2f3fd",
          "surface-container-lowest": "#ffffff",
          "surface-container-high": "#e6e8f2",
          "surface-container-highest": "#e0e2ec",
          "on-surface-variant": "#414754",
          "on-surface": "#191c23",
          "outline-variant": "#c1c6d6",
          "outline": "#727785",
          "primary": "#005bbf",
          "secondary": "#632ce5",
          "background": "#f9f9ff",
          "surface": "#f9f9ff",
          "error": "#ba1a1a",
          "error-container": "#ffdad6",
          "on-error-container": "#93000a",
          "success": "#1e7e34",
          "success-container": "#d4edda"
        },
        borderRadius: {
          DEFAULT: "0.25rem",
          lg: "0.5rem",
          xl: "1.5rem",
          full: "9999px"
        },
        spacing: {
          "stack-md": "24px",
          "margin-desktop": "64px",
          "stack-lg": "48px",
          "stack-sm": "12px",
          "margin-mobile": "20px",
          base: "8px",
          gutter: "24px",
          "container-max": "1280px"
        },
        fontFamily: {
          "headline-xl": ["Inter", "IBM Plex Sans Thai"],
          "body-lg": ["Inter", "IBM Plex Sans Thai"],
          "body-sm": ["Inter", "IBM Plex Sans Thai"],
          "body-md": ["Inter", "IBM Plex Sans Thai"],
          "label-md": ["Inter", "IBM Plex Sans Thai"],
          "headline-lg": ["Inter", "IBM Plex Sans Thai"],
          "headline-md": ["Inter", "IBM Plex Sans Thai"]
        },
        fontSize: {
          "headline-xl": ["40px", {"lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "600"}],
          "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
          "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
          "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
          "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
          "headline-lg": ["28px", {"lineHeight": "36px", "letterSpacing": "-0.01em", "fontWeight": "500"}],
          "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "500"}]
        }
      }
    }
  }
</script>
<style>
  html { scrollbar-gutter: stable; }
  html, body { overflow-x: hidden; }
  body {
    font-family: 'Inter', 'IBM Plex Sans Thai', sans-serif;
    background-color: #f9f9ff;
    color: #191c23;
  }
  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    display: inline-block;
    vertical-align: middle;
  }
  .gemini-gradient {
    background: linear-gradient(135deg, #1a73e8 0%, #7c4dff 100%);
  }
  .glass-card {
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(20px);
    border: 1px solid #F1F3F4;
  }
  .fade-in { animation: fadeIn 0.35s ease both; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  .spinner {
    width: 22px; height: 22px;
    border: 3px solid #c1c6d6; border-top-color: #005bbf;
    border-radius: 50%; animation: spin 0.7s linear infinite;
    display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body class="flex flex-col min-h-screen">

<nav class="fixed top-0 w-full z-50 bg-surface/80 backdrop-blur-xl shadow-[0_8px_32px_rgba(0,0,0,0.04)]">
  <div class="flex justify-between items-center h-16 px-margin-mobile md:px-margin-desktop max-w-container-max mx-auto">
    <a href="/" class="flex items-center gap-base">
      <span class="material-symbols-outlined text-primary text-[28px]">grid_view</span>
      <span class="font-headline-md text-headline-md font-bold text-on-surface">FlipGrid</span>
    </a>
    <div class="hidden md:flex items-center gap-stack-md">
      <a class="text-on-surface-variant hover:text-on-surface transition-colors font-body-md hover:bg-surface-container-highest/50 px-3 py-1 rounded-lg" href="/">Home</a>
      <a class="text-primary font-bold border-b-2 border-primary py-1 font-body-md" href="/history-page">History</a>
    </div>
    <div class="flex items-center gap-base">
      <button class="material-symbols-outlined p-2 text-on-surface-variant hover:bg-surface-container-highest/50 rounded-full transition-colors active:scale-95">help</button>
      <button class="material-symbols-outlined p-2 text-on-surface-variant hover:bg-surface-container-highest/50 rounded-full transition-colors active:scale-95">account_circle</button>
    </div>
  </div>
</nav>

<main class="flex-grow pt-24 pb-stack-lg px-margin-mobile md:px-margin-desktop max-w-container-max mx-auto w-full">

  <section class="text-center mt-stack-lg mb-stack-lg fade-in">
    <h1 class="font-headline-xl text-headline-xl mb-4">
      ประวัติการแปลง<br/>
      <span class="text-primary">ไฟล์ทั้งหมด</span>
    </h1>
    <p class="font-body-lg text-body-lg text-on-surface-variant max-w-2xl mx-auto">
      รายการไฟล์ที่อัปโหลด — เรียงจากใหม่ที่สุดไปเก่าที่สุด
      ดาวน์โหลดไฟล์ต้นทางหรือไฟล์ผลลัพธ์ได้
    </p>
  </section>

  <div class="flex justify-between items-center mb-gutter">
    <div class="flex items-center gap-stack-sm">
      <span class="font-body-sm text-body-sm text-on-surface-variant">รวม</span>
      <span id="total-count" class="font-headline-md text-headline-md font-bold text-primary">—</span>
      <span class="font-body-sm text-body-sm text-on-surface-variant">รายการ</span>
    </div>
    <button id="refresh" class="text-primary hover:bg-surface-container-highest/50 px-3 py-2 rounded-lg font-body-sm font-semibold flex items-center gap-1 transition-all">
      <span class="material-symbols-outlined text-[18px]">refresh</span>
      รีเฟรช
    </button>
  </div>

  <div id="history-container">
    <div class="glass-card rounded-xl p-stack-lg text-center">
      <span class="spinner"></span>
      <p class="font-body-md text-body-md text-on-surface-variant mt-stack-sm">กำลังโหลด...</p>
    </div>
  </div>

</main>

<div aria-hidden="true" class="pointer-events-none fixed inset-0 -z-10 overflow-hidden">
  <div class="absolute top-1/4 right-[-6rem] w-96 h-96 bg-primary/5 rounded-full blur-[100px]"></div>
  <div class="absolute bottom-1/4 left-[-6rem] w-80 h-80 bg-secondary/5 rounded-full blur-[100px]"></div>
</div>

<footer class="w-full py-stack-md bg-transparent mt-auto border-t border-surface-variant/50">
  <div class="flex flex-col md:flex-row justify-between items-center px-margin-mobile md:px-margin-desktop gap-base max-w-container-max mx-auto">
    <div class="flex flex-col items-center md:items-start">
      <span class="font-label-md text-label-md text-on-surface font-bold uppercase tracking-widest">FlipGrid</span>
      <p class="font-body-sm text-body-sm text-on-surface-variant">ใช้ skill <code class="text-primary">tv-spot-plan-grid</code></p>
    </div>
  </div>
</footer>

<script>
  const container = document.getElementById('history-container');
  const totalCount = document.getElementById('total-count');
  const refreshBtn = document.getElementById('refresh');

  function fmtSize(b) {
    if (b == null) return '—';
    if (b < 1024) return b + ' B';
    if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
    return (b/1048576).toFixed(2) + ' MB';
  }

  function fmtDateTime(iso) {
    const d = new Date(iso);
    const date = d.toLocaleDateString('th-TH', {
      timeZone: 'Asia/Bangkok',
      day: '2-digit', month: 'short', year: 'numeric'
    });
    const time = d.toLocaleTimeString('th-TH', {
      timeZone: 'Asia/Bangkok',
      hour: '2-digit', minute: '2-digit', second: '2-digit',
      hour12: false
    });
    return { date, time };
  }

  function escapeHtml(s) {
    return String(s ?? '').replace(/[&<>"']/g, c => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[c]));
  }

  function statusBadge(status) {
    if (status === 'success') {
      return `<span class="inline-flex items-center gap-1 bg-success-container text-success px-2 py-1 rounded-full font-label-md text-label-md font-semibold">
        <span class="material-symbols-outlined text-[14px]" style="font-variation-settings:'FILL' 1;">check_circle</span>
        สำเร็จ
      </span>`;
    }
    return `<span class="inline-flex items-center gap-1 bg-error-container text-on-error-container px-2 py-1 rounded-full font-label-md text-label-md font-semibold">
      <span class="material-symbols-outlined text-[14px]" style="font-variation-settings:'FILL' 1;">error</span>
      ผิดพลาด
    </span>`;
  }

  function renderItem(item) {
    const { date, time } = fmtDateTime(item.created_at);
    const s = item.summary;
    const summaryText = s
      ? `${s.channels} ช่อง • ${s.rows} รายการ • ${(s.spots ?? 0).toLocaleString()} สปอต • ${(s.money ?? 0).toLocaleString()} ฿${s.month ? ' • ' + s.month : ''}`
      : (item.error_msg ? `<span class="text-on-error-container">${escapeHtml(item.error_msg)}</span>` : '—');

    const inputBtn = item.input_url
      ? `<a href="${item.input_url}" class="text-on-surface-variant hover:text-primary font-body-sm flex items-center gap-1 hover:bg-surface-container-highest/50 px-2 py-1 rounded transition-all">
           <span class="material-symbols-outlined text-[16px]">upload_file</span> ต้นทาง
         </a>`
      : `<span class="text-outline-variant font-body-sm flex items-center gap-1 px-2 py-1">
           <span class="material-symbols-outlined text-[16px]">block</span> ต้นทาง
         </span>`;

    const outputBtn = item.output_url
      ? `<a href="${item.output_url}" class="text-primary hover:text-on-primary hover:bg-primary font-body-sm font-semibold flex items-center gap-1 px-2 py-1 rounded transition-all border border-primary/30">
           <span class="material-symbols-outlined text-[16px]">download</span> ผลลัพธ์
         </a>`
      : `<span class="text-outline-variant font-body-sm flex items-center gap-1 px-2 py-1">
           <span class="material-symbols-outlined text-[16px]">block</span> ผลลัพธ์
         </span>`;

    return `
      <tr class="border-b border-outline-variant/30 hover:bg-surface-container-low/50 transition-colors">
        <td class="px-4 py-3 align-top whitespace-nowrap">
          <div class="font-body-sm font-semibold text-on-surface">${date}</div>
          <div class="font-label-md text-label-md text-on-surface-variant">${time}</div>
        </td>
        <td class="px-4 py-3 align-top">
          <div class="font-body-sm font-semibold text-on-surface flex items-center gap-1">
            <span class="material-symbols-outlined text-[16px] text-primary">description</span>
            ${escapeHtml(item.original_filename)}
          </div>
          <div class="font-label-md text-label-md text-on-surface-variant mt-0.5">${fmtSize(item.input_size)}</div>
        </td>
        <td class="px-4 py-3 align-top">${statusBadge(item.status)}</td>
        <td class="px-4 py-3 align-top">
          <div class="font-body-sm text-body-sm text-on-surface-variant">${summaryText}</div>
        </td>
        <td class="px-4 py-3 align-top whitespace-nowrap">
          <div class="flex items-center gap-2">${inputBtn}${outputBtn}</div>
        </td>
      </tr>`;
  }

  function renderEmpty() {
    return `
      <div class="glass-card rounded-xl p-stack-lg text-center">
        <span class="material-symbols-outlined text-[48px] text-outline-variant mb-2">inbox</span>
        <p class="font-headline-md text-headline-md text-on-surface-variant mb-1">ยังไม่มีประวัติ</p>
        <p class="font-body-sm text-body-sm text-on-surface-variant mb-4">เริ่มอัปโหลดไฟล์เพื่อสร้างประวัติแรก</p>
        <a href="/" class="gemini-gradient text-white inline-flex items-center gap-2 px-5 py-2.5 rounded-full font-body-sm font-bold shadow-md hover:shadow-lg transition-all active:scale-95">
          <span class="material-symbols-outlined text-[18px]">add</span>
          อัปโหลดไฟล์
        </a>
      </div>`;
  }

  function render(items) {
    totalCount.textContent = items.length;
    if (!items.length) {
      container.innerHTML = renderEmpty();
      return;
    }
    container.innerHTML = `
      <div class="glass-card rounded-xl overflow-hidden">
        <div class="overflow-x-auto">
          <table class="w-full">
            <thead class="bg-surface-container border-b border-outline-variant/40">
              <tr>
                <th class="px-4 py-3 text-left font-label-md text-label-md text-on-surface-variant uppercase">วันที่ / เวลา</th>
                <th class="px-4 py-3 text-left font-label-md text-label-md text-on-surface-variant uppercase">ไฟล์ต้นทาง</th>
                <th class="px-4 py-3 text-left font-label-md text-label-md text-on-surface-variant uppercase">สถานะ</th>
                <th class="px-4 py-3 text-left font-label-md text-label-md text-on-surface-variant uppercase">สรุป / Error</th>
                <th class="px-4 py-3 text-left font-label-md text-label-md text-on-surface-variant uppercase">ดาวน์โหลด</th>
              </tr>
            </thead>
            <tbody>${items.map(renderItem).join('')}</tbody>
          </table>
        </div>
      </div>`;
  }

  async function load() {
    container.innerHTML = `
      <div class="glass-card rounded-xl p-stack-lg text-center">
        <span class="spinner"></span>
        <p class="font-body-md text-body-md text-on-surface-variant mt-stack-sm">กำลังโหลด...</p>
      </div>`;
    try {
      const res = await fetch('/history');
      const data = await res.json();
      render(data.items || []);
    } catch (e) {
      container.innerHTML = `
        <div class="rounded-xl border border-error/30 bg-error-container/40 p-stack-md flex items-start gap-stack-sm">
          <span class="material-symbols-outlined text-error" style="font-variation-settings: 'FILL' 1;">error</span>
          <div>
            <p class="font-body-md font-semibold text-on-error-container">โหลดประวัติไม่สำเร็จ</p>
            <p class="font-body-sm text-body-sm text-on-error-container mt-1">${escapeHtml(e.message)}</p>
          </div>
        </div>`;
    }
  }

  refreshBtn.addEventListener('click', load);

  window.addEventListener('scroll', () => {
    const nav = document.querySelector('nav');
    if (window.scrollY > 10) nav.classList.add('shadow-md');
    else nav.classList.remove('shadow-md');
  });

  load();
</script>
</body>
</html>
